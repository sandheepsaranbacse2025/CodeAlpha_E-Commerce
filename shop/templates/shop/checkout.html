{% extends 'shop/base.html' %}

{% block title %}E-Commerce Store - Checkout{% endblock %}

{% block content %}
<h1 style="font-size: 2.2rem; font-weight: 700; margin-bottom: 2rem;">Checkout</h1>

<div id="checkout-layout" class="cart-layout" style="display: none;">
    <!-- Left Column: Shipping Form -->
    <div class="auth-card" style="max-width: 100%; width: 100%; padding: 2rem;">
        <h2 style="font-size: 1.4rem; font-weight: 700; margin-bottom: 1.5rem;">Shipping Details</h2>
        <form id="checkout-form">
            <div class="form-group">
                <label for="shipping-name" class="form-label">Full Name</label>
                <input type="text" id="shipping-name" class="form-input" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label for="shipping-email" class="form-label">Email Address</label>
                <input type="email" id="shipping-email" class="form-input" required placeholder="john@example.com">
            </div>
            <div class="form-group">
                <label for="shipping-address" class="form-label">Full Address</label>
                <textarea id="shipping-address" class="form-input" rows="4" required placeholder="123 Luxury St, Appt 4B, Beverly Hills, CA 90210" style="resize: none;"></textarea>
            </div>
            <div style="margin-top: 2rem;">
                <button type="submit" class="btn btn-primary btn-full btn-icon" style="padding: 1rem;">
                    <i class="fa-solid fa-credit-card"></i> Place Order (Mock Payment)
                </button>
            </div>
        </form>
    </div>

    <!-- Right Column: Order Review -->
    <div class="cart-summary-card">
        <h2 class="summary-title">Review Order</h2>
        <div id="order-review-items" style="display: flex; flex-direction: column; gap: 1rem; max-height: 250px; overflow-y: auto; padding-right: 0.5rem;">
            <!-- Loaded dynamically -->
        </div>
        <div class="summary-row total" style="border-top: 1px solid var(--border-color); padding-top: 1rem; margin-top: 1rem;">
            <span>Amount Due</span>
            <span id="order-total-price">₹0.00</span>
        </div>
    </div>
</div>

<div id="loading-spinner" style="text-align: center; padding: 5rem;">
    <i class="fa-solid fa-spinner fa-spin fa-2xl" style="color: var(--accent);"></i>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', () => {
        verifyAndLoadCheckout();
        
        const form = document.getElementById('checkout-form');
        form.addEventListener('submit', handleCheckoutSubmit);
    });

    async function verifyAndLoadCheckout() {
        const layout = document.getElementById('checkout-layout');
        const spinner = document.getElementById('loading-spinner');
        const reviewContainer = document.getElementById('order-review-items');

        try {
            // Verify authentication
            const authRes = await fetch('/api/auth-status/');
            const authData = await authRes.json();
            
            if (!authData.authenticated) {
                window.showNotification('Please login to checkout.', 'error');
                window.location.href = "{% url 'login_page' %}?next=/checkout/";
                return;
            }

            // Fill default user information
            document.getElementById('shipping-email').value = authData.user.email || '';
            document.getElementById('shipping-name').value = authData.user.username || '';

            // Fetch cart items
            const cartRes = await fetch('/api/cart/');
            const cartData = await cartRes.json();
            const items = cartData.cart || [];

            if (items.length === 0) {
                window.showNotification('Your cart is empty. Add items to checkout.', 'warning');
                window.location.href = "{% url 'index' %}";
                return;
            }

            // Render order items review
            reviewContainer.innerHTML = '';
            let total = 0;

            items.forEach(item => {
                const itemCost = item.price * item.quantity;
                total += itemCost;

                const row = document.createElement('div');
                row.className = 'summary-row';
                row.style.fontSize = '0.9rem';
                row.innerHTML = `
                    <span style="max-width: 70%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                        ${item.quantity} x ${item.name}
                    </span>
                    <span>₹${itemCost.toFixed(2)}</span>
                `;
                reviewContainer.appendChild(row);
            });

            document.getElementById('order-total-price').textContent = `₹${total.toFixed(2)}`;

            spinner.style.display = 'none';
            layout.style.display = 'grid';

        } catch (error) {
            console.error('Error loading checkout review:', error);
            window.showNotification('Error loading checkout page.', 'error');
        }
    }

    async function handleCheckoutSubmit(e) {
        e.preventDefault();
        const submitBtn = e.target.querySelector('button[type="submit"]');
        const originalContent = submitBtn.innerHTML;
        
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing Order...';

        const name = document.getElementById('shipping-name').value;
        const email = document.getElementById('shipping-email').value;
        const address = document.getElementById('shipping-address').value;

        try {
            const res = await fetch('/api/checkout/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, address })
            });

            const data = await res.json();

            if (res.ok && data.success) {
                window.showNotification('Order placed successfully! Redirecting...', 'success');
                if (window.syncCartBadge) await window.syncCartBadge();
                setTimeout(() => {
                    window.location.href = "{% url 'orders_page' %}";
                }, 2000);
            } else {
                window.showNotification(data.error || 'Failed to place order.', 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalContent;
            }
        } catch (error) {
            console.error('Checkout error:', error);
            window.showNotification('An error occurred during checkout.', 'error');
            submitBtn.disabled = false;
            submitBtn.innerHTML = originalContent;
        }
    }
</script>
{% endblock %}
