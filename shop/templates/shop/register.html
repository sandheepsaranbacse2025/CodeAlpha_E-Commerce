{% extends 'shop/base.html' %}

{% block title %}E-Commerce Store - Create Account{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-subtitle">Join AuraShop for premium benefits</p>

        <form id="register-form" style="margin-top: 1rem;">
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <input type="text" id="username" class="form-input" required placeholder="Choose a username">
            </div>

            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" id="email" class="form-input" required placeholder="john@example.com">
            </div>
            
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" class="form-input" required placeholder="Min 6 characters">
            </div>

            <button type="submit" class="btn btn-primary btn-full btn-icon" style="padding: 0.8rem; margin-top: 1.5rem;">
                Register <i class="fa-solid fa-user-plus"></i>
            </button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="{% url 'login_page' %}">Sign In</a>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const form = document.getElementById('register-form');
        form.addEventListener('submit', handleRegister);
    });

    async function handleRegister(e) {
        e.preventDefault();
        
        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        if (password.length < 6) {
            window.showNotification('Password must be at least 6 characters long.', 'error');
            return;
        }
        
        const submitBtn = e.target.querySelector('button[type="submit"]');
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Creating Account...';

        try {
            const res = await fetch('/api/register/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });

            const data = await res.json();

            if (res.ok && data.success) {
                window.showNotification('Account created successfully!', 'success');
                if (window.syncAuthNav) await window.syncAuthNav();
                if (window.syncCartBadge) await window.syncCartBadge();
                
                setTimeout(() => {
                    window.location.href = "{% url 'index' %}";
                }, 1500);
            } else {
                window.showNotification(data.error || 'Registration failed.', 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Register <i class="fa-solid fa-user-plus"></i>';
            }
        } catch (error) {
            console.error('Registration error:', error);
            window.showNotification('An error occurred during registration.', 'error');
            submitBtn.disabled = false;
            submitBtn.innerHTML = 'Register <i class="fa-solid fa-user-plus"></i>';
        }
    }
</script>
{% endblock %}
